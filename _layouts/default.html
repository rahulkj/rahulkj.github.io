<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/css/style.css" | relative_url }}">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      const theme = savedTheme || systemTheme;
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  {%- feed_meta -%}
</head>

<body>

  <header class="site-header">
    <div class="wrapper" style="display: flex; justify-content: space-between; align-items: center;">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>

      <nav class="site-nav">
        <div class="trigger" style="display: flex; align-items: center; gap: 1rem;">
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" style="background:none;border:none;cursor:pointer;font-size:1.2rem;">🌓</button>
          <a class="page-link" href="{{ "/about" | relative_url }}">About</a>
          <a class="page-link" href="{{ "/categories" | relative_url }}">Categories</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <div class="footer-col-wrapper">
        <div class="footer-col">
          <p class="feed-subscribe">
            <a href="{{ "/feed.xml" | relative_url }}">
              <svg class="svg-icon" height="16" width="16" viewBox="0 0 16 16">
                <path fill="currentColor" d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2zM2 4h8v4H2V4zm10 10H2v-1c.9-.9 2.16-1.47 3.47-1.47 2.14 0 3.82 1.35 4.53 3.23.24.62.87 1.03 1.55 1.03.26 0 .52-.07.75-.2l1.85 1.85c-.61.34-1.29.55-2 .55-2.21 0-4-1.79-4-4z"></path>
              </svg>
              <span>Subscribe</span>
            </a>
          </p>
        </div>
        <div class="footer-col">
          <p>{{ site.description | escape }}</p>
        </div>
      </div>
    </div>
  </footer>

  <script>
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }
  </script>

</body>

</html>
